@if (onboarding.isCompleted()) {
    <section class="ec-plan-page">
        <header class="ec-plan-page__header">
            <h1 class="ec-plan-page__title">{{ 'plan.title' | transloco }}</h1>
            <p class="ec-plan-page__body">{{ 'plan.placeholder' | transloco }}</p>
        </header>

        <a [routerLink]="recapPlanUrl" class="ec-plan-page__cta">
            <i class="pi pi-play ec-plan-page__cta-icon" aria-hidden="true"></i>
            <span>{{ 'plan.cta.watchRecap' | transloco }}</span>
        </a>
    </section>
} @else {
    <section class="flex flex-col gap-3">
        <header class="px-4 pt-4">
            <p class="text-surface-500 dark:text-surface-400 text-sm">
                {{ 'plan.onboardingHeading' | transloco }}
            </p>
        </header>
        <app-onboarding-shell [embedded]="true" />
    </section>
}

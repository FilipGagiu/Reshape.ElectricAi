<div class="grid grid-cols-2 gap-3">
    @for (option of options; track option.id) {
        <app-selectable-card
            [labelKey]="option.labelKey"
            [icon]="option.icon ?? null"
            [layout]="'grid'"
            [selected]="profile().accommodation === option.value"
            (toggle)="select(option.value)"
        />
    }
</div>

<nav class="flex items-center justify-center gap-1.5" aria-label="Onboarding progress">
    @for (step of steps(); track step.index) {
        <button
            type="button"
            (click)="handleSelect(step)"
            [disabled]="!step.reachable"
            [class.bg-primary-500]="step.active"
            [class.w-6]="step.active"
            [class.bg-primary-300]="!step.active && step.reachable"
            [class.bg-surface-300]="!step.reachable"
            [class.dark:bg-surface-700]="!step.reachable"
            [class.cursor-pointer]="step.reachable"
            [class.cursor-not-allowed]="!step.reachable"
            class="h-1.5 w-1.5 rounded-full transition-all"
            [attr.aria-current]="step.active ? 'step' : null"
        ></button>
    }
</nav>

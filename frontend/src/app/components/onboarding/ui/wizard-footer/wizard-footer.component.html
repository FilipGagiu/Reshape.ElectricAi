<div class="flex flex-col gap-2 px-4 pt-3 pb-2">
    @if (hasCounter()) {
        <p class="text-surface-500 dark:text-surface-400 text-center text-xs font-medium">
            {{ counterKey() | transloco: counterParams() }}
        </p>
    }
    <p-button
        type="button"
        [label]="labelKey() | transloco"
        [disabled]="disabled()"
        styleClass="w-full"
        (onClick)="proceed.emit()"
    />
</div>

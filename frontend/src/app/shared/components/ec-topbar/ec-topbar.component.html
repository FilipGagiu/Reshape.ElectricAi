<header
    class="ec-topbar fixed top-0 right-0 left-0 z-[var(--z-sticky)] flex items-center gap-3 px-4"
    style="background-color: var(--ec-red); height: var(--space-14)"
>
    <img
        src="/ec-logo.png"
        alt="Electric Castle"
        class="shrink-0"
        style="width: 36px; height: 36px; border-radius: var(--radius-sm); object-fit: cover"
    />
    <div class="flex min-w-0 flex-1 flex-col leading-tight">
        <span
            class="truncate font-bold tracking-[0.1em] text-white uppercase"
            style="font-size: var(--type-label-size, 11px)"
            >{{ titleKey() | transloco }}</span
        >
        <span class="truncate text-[11px] text-white/70">{{ subtitleKey() | transloco }}</span>
    </div>
    <div class="flex items-center gap-2" aria-live="polite">
        <span
            class="inline-block"
            style="width: 8px; height: 8px; background-color: var(--ec-yellow)"
        ></span>
        <span
            class="font-bold tracking-[0.1em] text-white uppercase"
            style="font-size: 11px"
            >{{ 'liveFeed.status.live' | transloco }}</span
        >
    </div>
    @if (languageSwitcherEnabled) {
        <app-language-switcher class="ec-topbar__lang shrink-0" />
    }
</header>

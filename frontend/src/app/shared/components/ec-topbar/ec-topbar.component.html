<header
    *transloco="let t"
    class="ec-topbar sticky z-[var(--z-sticky)] flex items-center gap-3 px-4"
    style="background-color: var(--ec-red); height: var(--space-14)"
>
    <div
        class="flex shrink-0 items-center justify-center font-extrabold tracking-tight text-white italic"
        style="
            background-color: var(--ec-red);
            width: 32px;
            height: 24px;
            border: 1px solid rgba(255, 255, 255, 0);
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-glow-red);
            font-size: 14px;
        "
        aria-label="Electric Castle"
    >
        EC
    </div>
    <div class="flex min-w-0 flex-1 flex-col leading-tight">
        <span
            class="truncate font-bold tracking-[0.1em] text-white uppercase"
            style="font-size: var(--type-label-size, 11px)"
            >{{ t(titleKey()) }}</span
        >
        <span class="truncate text-[11px] text-white/70">{{ t(subtitleKey()) }}</span>
    </div>
    <div class="flex items-center gap-2" aria-live="polite">
        <span
            class="inline-block"
            style="width: 8px; height: 8px; background-color: var(--ec-yellow)"
        ></span>
        <span
            class="font-bold tracking-[0.1em] text-white uppercase"
            style="font-size: 11px"
            >{{ t('liveFeed.status.live') }}</span
        >
    </div>
    <button
        type="button"
        (click)="logout()"
        [attr.aria-label]="t('auth.logout.aria')"
        class="ec-topbar__logout flex shrink-0 items-center justify-center text-white transition-colors"
        style="
            width: 36px;
            height: 36px;
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: var(--radius-none);
            transition-duration: var(--duration-base);
        "
    >
        <i class="pi pi-sign-out" style="font-size: 18px"></i>
    </button>
</header>

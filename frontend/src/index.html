<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Electric Castle</title>
        <base href="/" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
        />
        <link rel="icon" type="image/png" href="ec-logo.png" />
        <link rel="manifest" href="manifest.webmanifest" />
        <meta name="theme-color" content="#ff0000" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="Electric Castle" />
        <link rel="apple-touch-icon" href="ec-logo.png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
            rel="stylesheet"
        />

        <!-- Early theme detection to prevent flash -->
        <script>
            // Inline script for maximum speed - prevents FOUC
            (function () {
                const savedTheme = localStorage.getItem('ec-hackaton-theme-mode');
                let isDark = false;

                if (savedTheme === 'dark' || savedTheme === 'light') {
                    isDark = savedTheme === 'dark';
                } else {
                    isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                }

                if (isDark) {
                    document.documentElement.classList.add('ec-hackaton-dark');
                }
            })();
        </script>
    </head>
    <body>
        <app-root></app-root>
    </body>
</html>
